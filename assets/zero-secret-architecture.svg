<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" role="img" aria-labelledby="title desc">
  <title id="title">Zero Secret Server Authentication architecture diagram</title>
  <desc id="desc">A conceptual diagram showing a client, a coordination server and a session result flow without server-side secret storage.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0d1628"/>
      <stop offset="100%" stop-color="#111f38"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="960" height="620" rx="40" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="72" y="118" width="250" height="220" rx="28" fill="#18253f" stroke="#334155"/>
    <rect x="355" y="88" width="250" height="280" rx="28" fill="#152033" stroke="#334155"/>
    <rect x="638" y="118" width="250" height="220" rx="28" fill="#18253f" stroke="#334155"/>
    <rect x="310" y="430" width="340" height="112" rx="28" fill="#111827" stroke="#334155"/>
  </g>
  <circle cx="146" cy="178" r="36" fill="#93c5fd"/>
  <path d="M146 160c11 0 20 9 20 20v8h4a8 8 0 0 1 8 8v30a16 16 0 0 1-16 16h-32a16 16 0 0 1-16-16v-30a8 8 0 0 1 8-8h4v-8c0-11 9-20 20-20zm-10 28h20v-8a10 10 0 0 0-20 0z" fill="#0f172a"/>
  <text x="72" y="94" fill="#e5eefc" font-size="26" font-family="Inter, Arial, sans-serif" font-weight="700">Client</text>
  <text x="104" y="272" fill="#e5eefc" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="600">Local secret</text>
  <text x="104" y="308" fill="#9fb0cb" font-size="20" font-family="Inter, Arial, sans-serif">Secret stays on the</text>
  <text x="104" y="336" fill="#9fb0cb" font-size="20" font-family="Inter, Arial, sans-serif">user-controlled side</text>
  <text x="355" y="64" fill="#e5eefc" font-size="26" font-family="Inter, Arial, sans-serif" font-weight="700">Coordination server</text>
  <text x="390" y="172" fill="#e5eefc" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="600">Challenge</text>
  <text x="390" y="206" fill="#9fb0cb" font-size="20" font-family="Inter, Arial, sans-serif">verification artifacts</text>
  <text x="390" y="270" fill="#e5eefc" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="600">No stored user</text>
  <text x="390" y="304" fill="#9fb0cb" font-size="20" font-family="Inter, Arial, sans-serif">secret in clear form</text>
  <text x="638" y="94" fill="#e5eefc" font-size="26" font-family="Inter, Arial, sans-serif" font-weight="700">Result</text>
  <text x="670" y="272" fill="#e5eefc" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="600">Authenticated</text>
  <text x="670" y="306" fill="#9fb0cb" font-size="20" font-family="Inter, Arial, sans-serif">session or denial</text>
  <text x="355" y="468" fill="#e5eefc" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">Research focus</text>
  <text x="355" y="505" fill="#9fb0cb" font-size="20" font-family="Inter, Arial, sans-serif">Architecture, tooling and methodology</text>
  <text x="355" y="533" fill="#9fb0cb" font-size="20" font-family="Inter, Arial, sans-serif">for authentication without server-side secrets</text>
  <path d="M322 228h83" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <path d="M555 228h83" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <path d="M395 228l-24 -18v36z" fill="#93c5fd"/>
  <path d="M565 228l24 -18v36z" fill="#93c5fd"/>
  <text x="326" y="200" fill="#cfe2ff" font-size="18" font-family="Inter, Arial, sans-serif">proof request</text>
  <text x="575" y="200" fill="#cfe2ff" font-size="18" font-family="Inter, Arial, sans-serif">session result</text>
</svg>
